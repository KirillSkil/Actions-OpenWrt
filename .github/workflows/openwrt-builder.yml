name: Build OpenWrt

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: .config
  DIY_P2_SH: diy-part2.sh

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init Env
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone Source
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update Feeds
      run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Load Config & DIY
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        ./$DIY_P2_SH
        cd openwrt && make defconfig

    - name: Download
      run: cd openwrt && make download -j8

    - name: Compile
      run: cd openwrt && make -j$(nproc)

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_Firmware
        path: openwrt/bin/targets/ramips/mt7621/*.bin
