name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext libssl-dev swig zip unzip zlib1g-dev python3 python3-setuptools

      - name: Clone OpenWrt
        run: git clone https://github.com/openwrt/openwrt.git openwrt

      - name: Patch Podkop & Config
        run: |
          cd openwrt
          git clone https://github.com/itdoginfo/podkop.git package/podkop
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p files/etc/uci-defaults
          cat <<EOF > files/etc/uci-defaults/99-custom-settings
#!/bin/sh
uci set luci.main.lang='ru'
uci set podkop.config.enabled='1'
uci set wireless.radio0.disabled='0'
uci set wireless.default_radio0.ssid='Ezel2'
uci set wireless.default_radio0.encryption='psk2'
uci set wireless.default_radio0.key='123456780'
uci commit
exit 0
EOF
          chmod +x files/etc/uci-defaults/99-custom-settings
          cat <<EOF > .config
CONFIG_TARGET_ramips=y
CONFIG_TARGET_ramips_mt7621=y
CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-4a-gigabit=y
CONFIG_TARGET_ROOTFS_INITRAMFS=y
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-i18n-russian=y
CONFIG_PACKAGE_podkop=y
CONFIG_LUCI_LANG_ru=y
EOF
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/ramips/mt7621/*.bin
