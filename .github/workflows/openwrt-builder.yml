name: OpenWrt 23.05 - Podkop RU (ramips/mt7621)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-23.05
          path: openwrt

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang gcc g++ gawk git gettext \
            libncurses5-dev libncursesw5-dev zlib1g-dev \
            libssl-dev wget curl unzip rsync file \
            python3 python3-distutils swig \
            libelf-dev autoconf automake libtool \
            libzstd-dev

      - name: Feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        working-directory: openwrt
        shell: bash
        run: |
          set -euo pipefail

          make defconfig

          TARGET="ramips"
          SUBTARGET="mt7621"

          make target=${TARGET} SUBTARGET=${SUBTARGET} defconfig

          # Try to enable Podkop and related Luci packages if they exist in feeds
          for p in \
            "podkop" \
            "luci-app-podkop" \
            "luci-i18n-podkop-ru" \
            "luci-app-podkop-ru" \
            "luci-i18n-podkop" \
            "luci-i18n-russian" ; do
              if make package/$p/info >/dev/null 2>&1; then
                echo "CONFIG_PACKAGE_${p}=y" >> .config
              fi
          done

          echo "CONFIG_PACKAGE_luci=y" >> .config || true
          echo "CONFIG_PACKAGE_luci-i18n-base-ru=y" >> .config || true

          make olddefconfig

      - name: Build
        working-directory: openwrt
        run: |
          make -j"$(nproc)" V=s

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-23.05-ramips-mt7621-podkop-ru
          path: openwrt/bin/
