name: Mi4A_v1_Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update apt package list
        run: sudo apt-get update

      - name: Install build dependencies
        run: sudo apt-get install -y build-essential flex gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev

      - name: Download, unpack and enter Image Builder directory
        run: |
          wget -O openwrt-imagebuilder.Linux-x86_64.tar.xz https://downloads.openwrt.org/releases/23.05.2/targets/ramips/mt7621/openwrt-imagebuilder-23.05.2-ramips-mt7621_generic.Linux-x86_64.tar.xz
          tar -xJvf openwrt-imagebuilder.Linux-x86_64.tar.xz
          cd openwrt-imagebuilder-23.05.2-ramips-mt7621_generic.Linux-x86_64/

      - name: Configure custom repositories
        run: |
          echo "src/gz podkop https://podkop.net" >> repositories.conf

      - name: Build OpenWrt image
        run: |
          make image PROFILE="xiaomi_mi-router-4a-gigabit" PACKAGES="luci podkop -ppp -ppp-mod-pppoe -kmod-ppp -kmod-pppoe"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: bin/targets/ramips/mt7621/*.bin
