name: openwrt-builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init Env
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget

      - name: Clone Source
        run: |
          git clone --depth 1 "https://github.com/openwrt/openwrt.git" -b openwrt-23.05 openwrt

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Patch Podkop & Config (NO heredoc)
        run: |
          cd openwrt

          git clone "https://github.com/itdoginfo/podkop.git" package/podkop

          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-custom-settings <<'SH'
uci set luci.main.lang='ru'
uci set podkop.config.enabled='1'
uci set wireless.radio0.disabled='0'
uci set wireless.default_radio0.ssid='Ezel2'
uci set wireless.default_radio0.encryption='psk2'
uci set wireless.default_radio0.key='123456780'
uci commit
exit 0
SH

          # Target / SoC
          sed -i '/^CONFIG_TARGET_/d' .config || true
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-4a-gigabit=y" >> .config

          # Rootfs
          sed -i '/^CONFIG_TARGET_ROOTFS_INITRAMFS=/d' .config || true
          echo "CONFIG_TARGET_ROOTFS_INITRAMFS=y" >> .config

          # LuCI + Russian
          sed -i '/^CONFIG_PACKAGE_luci=/d' .config || true
          sed -i '/^CONFIG_PACKAGE_luci-base=/d' .config || true
          sed -i '/^CONFIG_PACKAGE_luci-i18n-russian=/d' .config || true
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-russian=y" >> .config

          # Podkop + LuCI app
          sed -i '/^CONFIG_PACKAGE_podkop=/d' .config || true
          sed -i '/^CONFIG_PACKAGE_luci-app-podkop=/d' .config || true
          echo "CONFIG_PACKAGE_podkop=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-podkop=y" >> .config

          make defconfig

      - name: Download
        run: |
          cd openwrt
          make download -j8

      - name: Compile
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: List artifacts (sysupgrade)
        run: |
          ls -la openwrt/bin/targets/ramips/mt7621/
          echo "---- only sysupgrade ----"
          ls -la openwrt/bin/targets/ramips/mt7621/*sysupgrade*.bin || true

      - name: Upload sysupgrade
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Sysupgrade
          path: openwrt/bin/targets/ramips/mt7621/*sysupgrade*.bin
